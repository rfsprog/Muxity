<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Muxity</title>
    <base href="/" />

    <!-- Video.js -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.min.css" rel="stylesheet" />

    <!-- App styles -->
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">
        <svg class="loading-progress">
            <circle r="40%" cx="50%" cy="50%" />
            <circle r="40%" cx="50%" cy="50%" />
        </svg>
        <div class="loading-progress-text"></div>
    </div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <span class="dismiss">✕</span>
    </div>

    <!-- Video.js + HLS streaming -->
    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script src="https://unpkg.com/@videojs/http-streaming@3.12.2/dist/videojs-http-streaming.min.js"></script>

    <!-- Interop helpers -->
    <script src="js/videojs-interop.js"></script>
    <script src="js/oidc-helper.js"></script>
    <script src="js/upload-interop.js"></script>

    <!-- Expose API base URL to JS (set from appsettings.json via Blazor config) -->
    <script>window.__muxityApiBase = '{{ API_BASE }}';</script>

    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
