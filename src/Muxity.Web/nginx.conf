server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Blazor WASM — all routes fall back to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|wasm|dll|dat|blat)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # No cache for index.html itself
    location = /index.html {
        add_header Cache-Control "no-store";
    }

    gzip on;
    gzip_types text/plain application/javascript application/wasm application/octet-stream;
}
