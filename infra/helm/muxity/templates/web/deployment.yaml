apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "muxity.fullname" . }}-web
  labels:
    {{- include "muxity.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  replicas: {{ .Values.web.replicaCount }}
  selector:
    matchLabels:
      app: {{ include "muxity.fullname" . }}-web
  template:
    metadata:
      labels:
        app: {{ include "muxity.fullname" . }}-web
    spec:
      containers:
        - name: web
          image: "{{ .Values.web.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 80
          resources: {{- toYaml .Values.web.resources | nindent 12 }}
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "muxity.fullname" . }}-web
  labels:
    {{- include "muxity.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  selector:
    app: {{ include "muxity.fullname" . }}-web
  ports:
    - port: 80
      targetPort: 80
